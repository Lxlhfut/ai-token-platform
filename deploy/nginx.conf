# Nginx 配置文件 - ylxunlapi.top
# 路径: /etc/nginx/sites-available/ylxunlapi.top
# 使用方法: 见 deploy/README.md

# HTTP -> HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name ylxunlapi.top www.ylxunlapi.top;

    # Let's Encrypt 验证路径（Certbot 需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余所有请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置（Certbot 申请证书后自动填入证书路径，或手动填写）
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ylxunlapi.top www.ylxunlapi.top;

    # SSL 证书路径（Certbot 自动生成）
    ssl_certificate     /etc/letsencrypt/live/ylxunlapi.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ylxunlapi.top/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;

    # 文件上传限制（收款码图片等）
    client_max_body_size 10M;

    # 请求超时（AI 接口响应较慢）
    proxy_read_timeout 300s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;

    # 反向代理到 FastAPI（Docker 运行在 8000 端口）
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket 支持（流式输出需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 流式响应（SSE / stream）不缓冲
        proxy_buffering off;
        proxy_cache off;
    }

    # 静态文件直接由 Nginx 提供（可选优化，加速静态资源）
    # location /static/ {
    #     alias /opt/ai-token-platform/app/static/;
    #     expires 7d;
    # }
}
