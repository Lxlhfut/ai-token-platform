<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - {{ platform_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- 管理员登录 -->
  <div id="admin-login" class="card auth-card">
    <h2>管理员登录</h2>
    <form id="admin-login-form">
      <label>用户名</label><input type="text" name="username" required minlength="3" autocomplete="username">
      <label>密码</label><input type="password" name="password" required minlength="6" autocomplete="current-password">
      <button type="submit" class="btn btn-primary btn-block">登录</button>
    </form>
    <p id="admin-auth-msg" class="msg"></p>
  </div>

  <!-- 管理后台主体布局（登录后显示） -->
  <div id="app-layout" class="app-layout" style="display:none">

    <!-- 移动端侧边栏切换 -->
    <button class="sidebar-toggle" onclick="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      菜单
    </button>
    <div class="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- 侧边栏 -->
    <aside class="sidebar">
      <a href="/dashboard" class="sidebar-brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        {{ platform_name }} <span style="font-size:.75rem;color:var(--muted);font-weight:400">· 管理</span>
      </a>
      <nav class="sidebar-nav">
        <button class="sidebar-item active" data-tab="overview" onclick="switchTab('overview', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          概览
        </button>
        <button class="sidebar-item" data-tab="channels" onclick="switchTab('channels', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          渠道管理
        </button>
        <button class="sidebar-item" data-tab="pricing" onclick="switchTab('pricing', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          定价管理
        </button>
        <button class="sidebar-item" data-tab="users" onclick="switchTab('users', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          用户管理
        </button>
        <button class="sidebar-item" data-tab="redeem" onclick="switchTab('redeem', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 5v2m0 4v2m0 4v2M5 5h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3a2 2 0 0 0 0-4V7a2 2 0 0 1 2-2z"/></svg>
          兑换码
        </button>
        <button class="sidebar-item" data-tab="orders" onclick="switchTab('orders', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h8"/><path d="M8 18h5"/></svg>
          订单/用量
        </button>
      </nav>
      <div class="sidebar-footer">
        <button id="admin-logout" class="btn btn-outline" style="display:none">退出管理</button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">

      <!-- ====== 概览标签页 ====== -->
      <div class="tab-pane active" id="pane-overview">
        <div class="page-title">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          管理概览
        </div>
        <div class="stats-row" id="admin-stats"></div>
      </div>

      <!-- ====== 渠道管理标签页 ====== -->
      <div class="tab-pane" id="pane-channels">
        <div class="page-title">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          上游渠道管理
        </div>
        <div class="card section-card">
          <div class="section-header">
            <h3>上游渠道列表</h3>
            <button class="btn btn-primary btn-sm" onclick="showChannelForm()">添加渠道</button>
          </div>
          <div id="channels-list"></div>
        </div>
      </div>

      <!-- ====== 定价管理标签页 ====== -->
      <div class="tab-pane" id="pane-pricing">
        <div class="page-title">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          模型定价管理
        </div>
        <div class="card section-card">
          <div class="section-header">
            <h3>模型定价列表</h3>
            <button class="btn btn-primary btn-sm" onclick="showPricingForm()">添加定价</button>
          </div>
          <div id="pricing-list-admin"></div>
        </div>
      </div>

      <!-- ====== 用户管理标签页 ====== -->
      <div class="tab-pane" id="pane-users">
        <div class="page-title">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          用户管理
        </div>
        <div class="card section-card">
          <div class="section-header"><h3>用户列表</h3></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>余额</th><th>状态</th><th>操作</th></tr></thead>
              <tbody id="users-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ====== 兑换码标签页 ====== -->
      <div class="tab-pane" id="pane-redeem">
        <div class="page-title">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 5v2m0 4v2m0 4v2M5 5h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3a2 2 0 0 0 0-4V7a2 2 0 0 1 2-2z"/></svg>
          兑换码管理
        </div>
        <div class="card section-card">
          <div class="section-header">
            <h3>兑换码列表</h3>
            <button class="btn btn-primary btn-sm" id="redeem-form-btn" onclick="showRedeemForm()">生成兑换码</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>兑换码</th><th>面值</th><th>状态</th><th>使用者</th><th>使用时间</th><th>备注</th></tr></thead>
              <tbody id="redeem-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ====== 订单/用量标签页 ====== -->
      <div class="tab-pane" id="pane-orders">
        <div class="page-title">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          订单与用量
        </div>
        <div class="card section-card">
          <h3>充值订单</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>订单号</th><th>用户ID</th><th>金额</th><th>支付方式</th><th>状态</th><th>创建时间</th></tr></thead>
              <tbody id="orders-body"></tbody>
            </table>
          </div>
        </div>

        <div class="card section-card">
          <h3>全局用量</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>时间</th><th>用户</th><th>模型</th><th>Tokens</th><th>费用</th><th>状态</th></tr></thead>
              <tbody id="admin-usage-body"></tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- 模态框 -->
  <div id="modal" class="modal" style="display:none">
    <div class="modal-content card">
      <h3 id="modal-title">表单</h3>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="modal-submit">确认</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>initAdminDashboard();</script>
</body>
</html>
